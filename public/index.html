<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradutor LinkedIn</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="28" height="28">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      <span>Tradutor LinkedIn</span>
    </div>
  </header>

  <main>
    <p class="subtitle">Transforme qualquer texto no estilo profissional e inspirador do LinkedIn</p>

    <div class="editor">
      <div class="panel">
        <label for="input">Seu texto</label>
        <textarea id="input" placeholder="Digite aqui o que você quer dizer..."></textarea>
      </div>

      <div class="divider">
        <button id="translateBtn">
          <span id="btnText">Traduzir</span>
          <span id="btnSpinner" class="spinner hidden"></span>
        </button>
      </div>

      <div class="panel">
        <label for="output">Estilo LinkedIn</label>
        <textarea id="output" placeholder="O resultado aparecerá aqui..." readonly></textarea>
        <button id="copyBtn" class="copy-btn hidden">Copiar</button>
      </div>
    </div>

    <p id="errorMsg" class="error hidden"></p>
  </main>

  <footer>
    <p>Criado por <a href="http://www.ramosfrdev.com.br/" target="_blank">Fernando Rafael Ramos</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
